packages:
  - 'packages/types'
  - 'packages/rules'
  - 'packages/server'
  - 'packages/client'
  # packages/electron is intentionally excluded — it is installed separately
  # by build-dist.sh to avoid pnpm's build-script approval gate for Electron.

allowBuilds:
  better-sqlite3: true
  esbuild: true

overrides:
  cookie: ^0.7.0

allowedDeprecatedVersions:
  prebuild-install: '*'
